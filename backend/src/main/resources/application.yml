server:
  port: ${SERVER_PORT:8099}

spring:
  application:
    name: washhelper-backend

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mariadb://localhost:3306/washhelper?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:123456}
    driver-class-name: org.mariadb.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    show-sql: ${JPA_SHOW_SQL:true}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MariaDBDialect
        format_sql: true

  data:
    redis:
      host: ${SPRING_REDIS_HOST:localhost}
      port: ${SPRING_REDIS_PORT:6379}
      password: ${SPRING_REDIS_PASSWORD:${REDIS_PASSWORD:}}
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms

logging:
  level:
    org.hibernate.SQL: ${LOG_SQL_LEVEL:debug}
    org.hibernate.orm.jdbc.bind: ${LOG_SQL_BIND_LEVEL:trace}

app:
  api-key: ${APP_API_KEY:your-secret-api-key-here}
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:*}
    allowed-methods: ${APP_CORS_ALLOWED_METHODS:*}
    allowed-headers: ${APP_CORS_ALLOWED_HEADERS:*}